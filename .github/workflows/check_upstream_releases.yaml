name: Check Upstream Releases

on:
  schedule:
    # Run every other day at 07:10 UTC
    - cron: "10 7 */2 * *"
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  check-releases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Check for upstream releases and trigger updates
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -e

          get_github_repo() {
            local sources="$1"
            echo "$sources" | grep -oP 'github\.com/\K[^/]+/[^/]+' | head -1 | sed 's:/*$::'
          }

          normalize_version() {
            echo "$1" | sed 's/^v//'
          }

          detect_bump_type() {
            local old_ver="$1"
            local new_ver="$2"

            # Extract version components
            old_major=$(echo "$old_ver" | cut -d. -f1)
            old_minor=$(echo "$old_ver" | cut -d. -f2)
            old_patch=$(echo "$old_ver" | cut -d. -f3 | grep -oP '^\d+')

            new_major=$(echo "$new_ver" | cut -d. -f1)
            new_minor=$(echo "$new_ver" | cut -d. -f2)
            new_patch=$(echo "$new_ver" | cut -d. -f3 | grep -oP '^\d+')

            if [ "$new_major" -gt "$old_major" ]; then
              echo "major"
            elif [ "$new_minor" -gt "$old_minor" ]; then
              echo "minor"
            elif [ "$new_patch" -gt "$old_patch" ]; then
              echo "patch"
            else
              echo "minor"  # default
            fi
          }

          version_gt() {
            test "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1"
          }

          echo "Checking for upstream releases..."
          echo "================================"

          updates_count=0

          for chart_file in charts/*/Chart.yaml; do
            if [ ! -f "$chart_file" ]; then
              continue
            fi

            chart_dir=$(dirname "$chart_file")
            chart_name=$(yq eval '.name' "$chart_file")
            current_app_version=$(yq eval '.appVersion' "$chart_file" | tr -d '"')
            sources=$(yq eval '.sources[]' "$chart_file" | tr '\n' ' ')

            echo ""
            echo "Chart: $chart_name"
            echo "  Current appVersion: $current_app_version"

            github_repo=$(get_github_repo "$sources")

            if [ -z "$github_repo" ]; then
              echo "  ⚠️  No GitHub repository found in sources"
              continue
            fi

            echo "  Upstream repo: $github_repo"

            latest_release=$(gh api "repos/$github_repo/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")

            if [ -z "$latest_release" ]; then
              echo "  ⚠️  Could not fetch latest release"
              continue
            fi

            latest_version=$(normalize_version "$latest_release")
            echo "  Latest version: $latest_version"

            # Normalize current version
            normalized_current=$(normalize_version "$current_app_version")

            # Compare versions
            if [ "$normalized_current" = "$latest_version" ]; then
              echo "   Up to date"
            elif version_gt "$latest_version" "$normalized_current"; then
              bump_type=$(detect_bump_type "$normalized_current" "$latest_version")
              echo "   New version available! Bump type: $bump_type"

              echo "  Triggering workflow..."
              echo gh workflow run app_release.yaml \
                -f chart_name="$chart_name" \
                -f app_version="$latest_version" \
                -f bump_type="$bump_type"

              updates_count=$((updates_count + 1))

              sleep 2
            else
              echo "   Up to date (current version is newer)"
            fi
          done

          echo ""
          echo "================================"
          if [ $updates_count -eq 0 ]; then
            echo " All charts are up to date!"
          else
            echo " Triggered $updates_count workflow(s)"
          fi
