name: Release

on:
  push:
    tags:
      - "*-[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  release:
    needs: test
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "chart-bot"
          git config --global user.email "helm-charts@mail.tty.se"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        env:
          GITHUB_TOKEN: "${{ secrets.BOT_TOKEN }}"

      - name: Get chart name from tag
        id: chart
        run: |
          TAG="${GITHUB_REF_NAME}"
          CHART_NAME="${TAG%-[0-9]*.[0-9]*.[0-9]*}"
          echo "name=${CHART_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          install_only: true
          version: v1.7.0

      - name: Package chart
        run: |
          helm package "charts/${{ steps.chart.outputs.name }}" --destination .cr-release-packages

      - name: Upload chart to GitHub release
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --packages-with-index false \
            --token "${{ secrets.BOT_TOKEN }}" \
            --skip-existing

      - name: Update Helm repo index
        run: |
          mkdir -p .cr-index
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --pages-branch gh-pages \
            --packages-with-index false \
            --token "${{ secrets.BOT_TOKEN }}" \
            --push
