{{- if and .Values.gateway.enabled (not .Values.gateway.existingGateway) }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "silverbullet.fullname" . }}
  labels:
    {{- include "silverbullet.labels" . | nindent 4 }}
    {{- with .Values.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
  {{- range .Values.gateway.listeners }}
  - name: {{ .name }}
    port: {{ .port }}
    protocol: {{ .protocol }}
    {{- if .hostname }}
    hostname: {{ .hostname | quote }}
    {{- end }}
    {{- if .allowedRoutes }}
    allowedRoutes:
      {{- toYaml .allowedRoutes | nindent 6 }}
    {{- end }}
    {{- if and (eq .protocol "HTTPS") .tls }}
    tls:
      {{- toYaml .tls | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
