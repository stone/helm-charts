# Default values for silverbullet
replicaCount: 1

image:
  repository: ghcr.io/silverbulletmd/silverbullet
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  # Set to false for improved security unless your application needs Kubernetes API access
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}
  # Uncomment to enforce Pod Security Standards at the pod level
  # pod-security.kubernetes.io/enforce: restricted
  # pod-security.kubernetes.io/audit: restricted
  # pod-security.kubernetes.io/warn: restricted

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 3000
  # NodePort configuration (only used when type: NodePort)
  # If not specified, Kubernetes will auto-assign a port in the range 30000-32767
  nodePort: ""
  # Additional service annotations
  annotations: {}
  # Labels to add to the service
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: silverbullet.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: silverbullet-tls
  #    hosts:
  #      - silverbullet.local

# Gateway API configuration
# Requires Gateway API CRDs to be installed
# https://gateway-api.sigs.k8s.io/
gateway:
  enabled: false
  # Name of the Gateway to attach to
  # If empty, a Gateway resource will be created
  existingGateway: ""
  # Gateway configuration (only used if existingGateway is empty)
  gatewayClassName: ""
  annotations: {}
  labels: {}
  # Listeners for the Gateway (if creating new Gateway)
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      # hostname: "*.example.com"
  # HTTPRoute configuration
  httpRoute:
    annotations: {}
    labels: {}
    hostnames:
      - silverbullet.local
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
    tls:
      enabled: false
      # certificateRefs:
      #   - name: silverbullet-tls
      #     kind: Secret

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Network Policy configuration for enhanced security
networkPolicy:
  enabled: false
  # Ingress rules
  ingress:
    # Allow ingress from specific namespaces
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Allow ingress from pods with specific labels
    # - from:
    #   - podSelector:
    #       matchLabels:
    #         app: my-app
  # Egress rules - by default deny all egress except DNS
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Add additional egress rules as needed
    # - to:
    #   - podSelector: {}

# Persistence for SilverBullet space (notes storage)
persistence:
  enabled: true
  # existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  annotations: {}

# SilverBullet specific configuration
silverbullet:
  # Authentication - IMPORTANT: Set this for production!
  # Format: username:password
  # It's recommended to use a secret rather than setting this directly
  auth:
    # Set username and password for authentication
    # Leave empty to disable authentication (NOT RECOMMENDED for production)
    username: ""
    password: ""
    # Alternatively, use an existing secret
    # existingSecret: ""
    # existingSecretUsernameKey: "username"
    # existingSecretPasswordKey: "password"
    # Bearer token authentication
    token: ""
    # existingSecretTokenKey: "token"
    # Lockout settings
    lockoutLimit: 10
    lockoutTime: 60
    rememberMeHours: 168 # 7 days

  # Default page to load
  indexPage: "index"

  # Space ignore patterns (gitignore-style)
  spaceIgnore: ""

  # Enable HTTP request logging
  httpLogging: false

  # Enable client log push to server
  logPush: false

  # URL prefix for hosting under a specific path
  urlPrefix: ""

  # Read-only mode
  readOnly: false

  # Shell backend (local, off)
  shellBackend: "local"

  # Shell command whitelist
  shellWhitelist: ""

  # Metrics
  metrics:
    enabled: false
    port: 9090

  # Web app manifest customization
  name: "SilverBullet"
  description: "SilverBullet - Personal Knowledge Management"

  # Additional environment variables
  extraEnv: []
  # - name: CUSTOM_VAR
  #   value: "custom_value"

  # Environment variables from secrets or configmaps
  extraEnvFrom: []
  # - secretRef:
  #     name: my-secret
  # - configMapRef:
  #     name: my-configmap
