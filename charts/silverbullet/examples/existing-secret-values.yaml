# Example using an existing Kubernetes secret for authentication
# This is the recommended approach for production

# First, create the secret manually:
# kubectl create secret generic silverbullet-auth \
#   --from-literal=sb-user='admin:your-secure-password'

silverbullet:
  auth:
    # Reference the existing secret
    existingSecret: silverbullet-auth
    existingSecretUsernameKey: sb-user

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: notes.example.com
      paths:
        - path: /
          pathType: Prefix

persistence:
  size: 10Gi
